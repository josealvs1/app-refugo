<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aferição de Refugo</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="Disbecol.png">
</head>
<body>

<div class="container">
  <header>
    <h1>Aferição de Refugo</h1>
    <p>Registro por tipo de vasilhame com tempo individual</p>
  </header>

  <section class="card">
    <label for="ajudante">Ajudante responsável</label>
    <select id="ajudante">
      <option value="">Carregando...</option>
    </select>

    <label for="mapa">Mapa</label>
    <input type="number" id="mapa" min="1" placeholder="Digite o número do mapa" />

    <button id="btnIniciarGeral" onclick="iniciarAfericaoGeral()">Iniciar Aferição do Mapa</button>
  </section>

  <section class="card" id="areaTipo" style="display:none;">
    <h2>Novo Vasilhame</h2>

    <label for="tipo">Tipo de vasilhame</label>
    <select id="tipo">
      <option value="">Selecione...</option>
    </select>

    <button id="btnIniciarItem" onclick="iniciarVasilhame()">Iniciar Aferição deste Vasilhame</button>
  </section>

  <section class="card timer-card" id="areaTimerItem" style="display:none;">
    <p>Tempo deste vasilhame</p>
    <h2 id="timerItem">00:00:00</h2>
    <span id="horaInicioItemTexto"></span>
  </section>

  <section class="card" id="areaRegistro" style="display:none;">
    <h2>Dados da Aferição do Mapa</h2>

    <label for="quantidadeAferida">Quantidade Aferida</label>
    <input type="number" id="quantidadeAferida" min="1" placeholder="Ex: 10" />

    <h3>Quantidade Refugada por Motivo</h3>
    <div id="motivosContainer"></div>

    <label for="observacao">Observação</label>
    <textarea id="observacao" placeholder="Opcional"></textarea>

    <button class="finalizar" onclick="finalizarVasilhame()">Finalizar este Vasilhame</button>
  </section>

  <section class="card" id="areaLista" style="display:none;">
    <h2>Vasilhames Registrados</h2>
    <div id="listaItens"></div>

    <button onclick="novaAfericao()">Finalizar Mapa</button>
  </section>

  <div id="mensagem"></div>
</div>

<script src="script.js"></script>
</body>
</html>
